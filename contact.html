<body>

    <header class="navbar">
        <h2 class="logo">Zahraaa.</h2>
        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="skills.html">Skills</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="container">
    <span class="tag">Get In Touch</span>
    
    <div class="contact-grid">
        <div class="contact-info">
            <h1 class="hero-title">Let's Build <span>Something Great</span></h1>
            <p>Punya ide project, tawaran asdos, atau sekadar kolaborasi seni? Langsung kirim pesan saja!</p>
            
            <div class="personal-details">
                <p>📧 zahraayzzh@gmail.com</p>
                <p>📍 Lampung, Indonesia</p>
            </div>
            
            <div class="social-pills">
                <a class="pill" href="https://github.com/Zahra-ayu" target="_blank"> GitHub </a>
                <a class="pill" href="https://www.linkedin.com/in/zahra-ayu-azizah-7303a43b8/" target="_blank"> LinkedIn </a>
                <a class="pill" href="https://www.instagram.com/zhraayzzh?igsh=ZWhsZ3Y1anRiNDVu" target="_blank"> Instagram </a>
                <a class="pill" href="https://x.com/zahraaazz110758" target="_blank"> Twitter </a>
            </div>
        </div>

        <div class="contact-card">
            <form action="#">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Zahra Ayu">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="zahra@email.com">
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Tell me about your project..."></textarea>
                </div>
                <button type="submit" class="send-btn">SEND MESSAGE</button>
            </form>
        </div>
    </div>
</div>
<div id="notif" class="notif">Message sent successfully!</div>

<script src="script.js"></script>
